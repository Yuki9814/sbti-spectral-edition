<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBTI 人格测试</title>
  <meta name="description" content="31 道题，15 个维度，一次偏锋、娱乐向的互联网人格扫描。">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="ambient ambient-c"></div>

  <main class="shell">
    <section id="intro" class="screen active">
      <div class="hero card reveal">
        <div class="hero-copy">
          <div class="eyebrow">SBTI Personality Test</div>
          <h1>SBTI 人格测试</h1>
          <p class="hero-sub">31 道题，15 个维度，一次偏锋、娱乐向的互联网人格扫描。</p>

          <div class="hero-meta">
            <span>31 道题</span>
            <span>15 个维度</span>
            <span>隐藏分支</span>
          </div>

          <div class="hero-actions">
            <button id="startBtn" class="btn-primary">开始测试</button>
          </div>
        </div>
      </div>
    </section>

    <section id="test" class="screen">
      <div class="test-wrap card reveal">
        <div class="topbar">
          <div class="topbar-copy">
            <div class="eyebrow">Questionnaire</div>
            <p>按直觉作答。</p>
          </div>
          <div class="topbar-progress">
            <div class="progress"><span id="progressBar"></span></div>
            <div class="progress-text" id="progressText">0 / 31</div>
          </div>
        </div>

        <div id="questionList" class="question-list"></div>

        <div class="actions-bottom">
          <div class="hint" id="testHint">全部选完才能提交。</div>
          <div class="action-buttons">
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
            <button id="submitBtn" class="btn-primary" disabled>查看结果</button>
          </div>
        </div>
      </div>
    </section>

    <section id="result" class="screen">
      <div class="result-wrap card reveal">
        <div class="result-top">
          <div class="poster-box" id="posterBox">
            <a id="posterAnchor" class="poster-anchor" href="#" target="_blank" rel="noreferrer">
              <img id="posterImage" class="poster-image" alt="人格结果图">
            </a>
            <div class="poster-meta">
              <div id="posterCaption" class="poster-caption">怎么回事，被我拿捏了吧？</div>
              <a id="posterSourceLink" class="source-pill" href="#" target="_blank" rel="noreferrer">图片来源</a>
            </div>
          </div>

          <div class="type-box">
            <div class="type-kicker" id="resultModeKicker">你的主类型</div>
            <div class="type-name" id="resultTypeName">CTRL（拿捏者）</div>
            <div class="match" id="matchBadge">匹配度 92%</div>
            <div class="type-subname" id="resultTypeSub">系统备注会显示在这里。</div>
          </div>
        </div>

        <div class="analysis-box">
          <h2>人格解读</h2>
          <p id="resultDesc"></p>
        </div>

        <div class="dim-box">
          <h2>十五维度</h2>
          <div id="dimList" class="dim-list"></div>
        </div>

        <div class="note-box">
          <p id="funNote">娱乐向测试，请别把结果当诊断。</p>
        </div>

        <div class="result-actions">
          <div class="action-buttons">
            <button id="restartBtn" class="btn-secondary">重新测试</button>
            <button id="toTopBtn" class="btn-primary">回到首页</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="./main.js"></script>
  <script src="./original-type-images.js"></script>
  <script src="./overrides.js"></script>
</body>
</html>
